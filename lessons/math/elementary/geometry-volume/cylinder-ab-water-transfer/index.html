<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>円柱の水の移し替え</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]});"></script>
  <style>
    :root {
      --bg: #f8fafc; --card: #ffffff; --line: #d9e2ec;
      --ink: #1f2937; --muted: #4b5563; --accent: #111827;
      --blue: #2563eb; --cyan: #0891b2; --green: #16a34a;
      --orange: #f59e0b; --violet: #7c3aed;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f0f9ff 0%, #e0f2fe 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .app {
      width: min(1060px, 100%);
      margin: 0 auto;
      background: var(--card);
      border: 1px solid #bae6fd;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 18px 38px rgba(14,116,144,.10);
    }
    .head {
      padding: 16px 18px 12px;
      border-bottom: 1px solid #e0f2fe;
      background: #f0f9ff;
    }
    .head h1 { margin: 0 0 8px; font-size: 22px; }
    .lang-row {
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; flex-wrap: wrap; margin-bottom: 8px;
    }
    .lang-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
    .lang-btn {
      border: 1px solid #d1d5db; background: #fff; color: #111827;
      border-radius: 8px; padding: 7px 10px; font-size: 13px; cursor: pointer;
    }
    .lang-btn.active { background: #111827; color: #fff; border-color: #111827; }
    .lang-btn.auto-on { background: #0e7490; border-color: #0e7490; color: #fff; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 18px 0; }
    .tab-btn {
      border: 1px solid #d1d5db; background: #fff; border-radius: 10px;
      padding: 8px 12px; cursor: pointer; font-size: 14px;
    }
    .tab-btn.active { background: #111827; border-color: #111827; color: #fff; }
    .tab-panel { padding: 12px 18px 18px; }
    .hidden { display: none !important; }
    .grid {
      display: grid; grid-template-columns: 1.1fr 1fr; gap: 12px;
    }
    .card {
      border: 1px solid var(--line); border-radius: 12px;
      background: #fff; padding: 12px; line-height: 1.6;
    }
    .card h3 { margin: 0 0 8px; font-size: 16px; }
    .problem-photo {
      width: 100%; border: 1px solid #d1d5db; border-radius: 10px;
      display: block; background: #fff;
    }
    .teacher-tools {
      display: flex; flex-wrap: wrap; gap: 8px; margin: 4px 0 10px;
    }
    .teacher-tools button {
      border: 1px solid #d1d5db; background: #fff; color: #111827;
      border-radius: 8px; padding: 7px 10px; font-size: 13px; cursor: pointer;
    }
    .teacher-tools button.on { background: #0e7490; border-color: #0e7490; color: #fff; }
    .step-block {
      border-top: 1px dashed #d1d5db; padding-top: 8px; margin-top: 8px;
    }
    .formula {
      background: #f0f9ff; border: 1px dashed #7dd3fc;
      border-radius: 10px; padding: 10px 12px; margin: 6px 0;
      font-size: 15px; line-height: 1.8;
    }
    .answer-box {
      background: #ecfdf5; border: 2px solid #6ee7b7; border-radius: 10px;
      padding: 10px 12px; margin: 8px 0; font-size: 16px; font-weight: 600;
    }
    .mistake-box {
      background: #fff7ed; border: 1px dashed #fb923c; border-radius: 10px;
      padding: 10px 12px; margin: 8px 0; font-size: 13px;
    }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border: 1px solid #e5e7eb; padding: 6px 8px; text-align: left; vertical-align: top; }
    th { background: #f0f9ff; }
    .anim-wrap {
      border: 1px solid #bae6fd; border-radius: 12px; padding: 14px;
      background: #f0f9ff;
    }
    .anim-canvas {
      width: 100%; background: #fff; border: 1px solid #e0f2fe;
      border-radius: 10px; display: block;
    }
    .controls {
      margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
    }
    .controls button {
      border: 0; border-radius: 10px; padding: 9px 14px;
      background: #e0f2fe; color: #111827; cursor: pointer;
      font-size: 14px; min-height: 40px;
    }
    .controls button.primary { background: #0e7490; color: #fff; }
    .scene-caption {
      margin-top: 10px; border: 1px solid #bae6fd; border-radius: 10px;
      background: #fff; padding: 9px 12px; font-size: 14px;
    }
    .phase-dots {
      display: flex; gap: 8px; justify-content: center; margin-top: 10px;
    }
    .phase-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #bae6fd; border: 2px solid #7dd3fc; transition: all .3s;
    }
    .phase-dot.active { background: #0891b2; border-color: #0e7490; transform: scale(1.3); }
    .keyframes { margin: 10px 0 0; padding: 0; list-style: none; display: grid; gap: 6px; }
    .keyframes li {
      border: 1px solid #e5e7eb; background: #fff; border-radius: 10px;
      padding: 8px 10px; font-size: 13px; color: #475569;
      transition: all .2s ease; opacity: .32;
    }
    .keyframes li.active {
      border-color: #0891b2; color: #111827; background: #ecfeff;
      transform: translateX(2px); opacity: 1;
    }
    @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
    @media (max-width: 420px) {
      body { padding: 10px; }
      .head h1 { font-size: 18px; }
      .tabs { padding: 10px 10px 0; }
      .tab-panel { padding: 10px; }
    }
  </style>
</head>
<body>
<main class="app">
  <section class="head">
    <div class="lang-row">
      <h1 id="titleText">円柱の水の移し替え（深さの変化）</h1>
      <div class="lang-buttons">
        <button class="lang-btn" id="langJaBtn">日本語</button>
        <button class="lang-btn" id="langZhBtn">中文</button>
        <button class="lang-btn" id="langEnBtn">English</button>
        <button class="lang-btn" id="autoLangBtn">自动轮播 OFF</button>
      </div>
    </div>
    <p id="descText" style="margin:0;color:var(--muted);font-size:14px;"></p>
  </section>

  <section class="tabs">
    <button id="tabProblemBtn" class="tab-btn active">原题</button>
    <button id="tabSolutionBtn" class="tab-btn">解法</button>
    <button id="tabAnimationBtn" class="tab-btn">动画</button>
  </section>

  <!-- ===== PROBLEM TAB ===== -->
  <section id="tabProblem" class="tab-panel">
    <div class="grid">
      <div class="card">
        <h3 id="problemImageTitle">問題図</h3>
        <img class="problem-photo" src="./assets/problem-photo.png" alt="問題図" />
      </div>
      <div class="card">
        <h3 id="problemTextTitle">問題抽出</h3>
        <p id="problemText"></p>
        <h3 id="givenTitle">与えられた条件</h3>
        <ul id="givenList"></ul>
        <h3 id="targetTitle">求めるもの</h3>
        <ol id="targetList"></ol>
      </div>
    </div>
  </section>

  <!-- ===== SOLUTION TAB ===== -->
  <section id="tabSolution" class="tab-panel hidden">
    <div class="card">
      <h3 id="solutionMainTitle">二つの解法</h3>
      <div class="teacher-tools">
        <button id="teacherModeBtn">先生モード OFF</button>
        <button id="nextStepBtn" class="hidden">次のステップを表示</button>
      </div>

      <!-- Method A -->
      <div class="step-block step-answer" data-step="1">
        <p id="methodATitle"><strong>方法 A：体積公式</strong></p>
        <p id="step1Text"></p>
        <div class="formula" id="step1Formula"></div>
      </div>
      <div class="step-block step-answer" data-step="2">
        <p id="step2Text"></p>
        <div class="formula" id="step2Formula"></div>
        <div class="answer-box" id="answer1Box"></div>
      </div>

      <!-- Method B -->
      <div class="step-block step-answer" data-step="3">
        <p id="methodBTitle"><strong>方法 B：底面積の比</strong></p>
        <p id="step3Text"></p>
        <div class="formula" id="step3Formula"></div>
      </div>
      <div class="step-block step-answer" data-step="4">
        <p id="step4Text"></p>
        <div class="formula" id="step4Formula"></div>
        <div class="answer-box" id="answer2Box"></div>
      </div>

      <!-- Common mistake -->
      <div class="step-block step-answer" data-step="5">
        <div class="mistake-box" id="mistakeBox"></div>
      </div>
    </div>

    <!-- Cross-validation matrix -->
    <div class="card" style="margin-top:12px;">
      <h3 id="verifyTitle">交叉検証</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th id="colMethod">方法</th>
              <th id="col1">問(1) 答え</th>
              <th id="col2">問(2) 答え</th>
              <th id="colCheck">確認</th>
            </tr>
          </thead>
          <tbody id="verifyTableBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- ===== ANIMATION TAB ===== -->
  <section id="tabAnimation" class="tab-panel hidden">
    <div class="anim-wrap">
      <h3 id="animTitle" style="margin:0 0 10px;">水の移し替えシミュレーション</h3>
      <svg id="animSvg" class="anim-canvas" viewBox="0 0 500 260" xmlns="http://www.w3.org/2000/svg">
        <!-- Background -->
        <rect width="500" height="260" fill="#f8faff"/>

        <!-- Ground line -->
        <line x1="20" y1="235" x2="480" y2="235" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3"/>

        <!-- === CYLINDER A (wide: radius 12cm → draw 180px wide, 80px tall, scaled) === -->
        <!-- A outer shell -->
        <rect id="cylA" x="60" y="155" width="180" height="80" rx="4"
              fill="none" stroke="#0891b2" stroke-width="2.5"/>
        <!-- A top ellipse (open top) -->
        <ellipse cx="150" cy="155" rx="90" ry="12" fill="none" stroke="#0891b2" stroke-width="2"/>
        <!-- A bottom ellipse -->
        <ellipse cx="150" cy="235" rx="90" ry="12" fill="#e0f2fe" stroke="#0891b2" stroke-width="2"/>
        <!-- A water fill (starts at 3cm water = 3/12 * 80 = 20px from bottom) -->
        <rect id="waterA" x="61" y="215" width="178" height="20"
              fill="#38bdf8" fill-opacity=".7"/>
        <!-- A water surface ellipse -->
        <ellipse id="waterATop" cx="150" cy="215" rx="89" ry="10"
                 fill="#7dd3fc" fill-opacity=".9"/>
        <!-- A label -->
        <text x="150" y="248" text-anchor="middle" font-size="14" font-weight="700" fill="#0e7490">A</text>
        <text id="labelA" x="150" y="263" text-anchor="middle" font-size="11" fill="#0891b2">r = 12 cm</text>
        <!-- A water depth label -->
        <text id="depthLabelA" x="38" y="220" font-size="11" fill="#0891b2" text-anchor="middle">3 cm</text>
        <!-- A height dimension markers -->
        <line x1="30" y1="155" x2="30" y2="235" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
        <text x="22" y="198" font-size="9" fill="#94a3b8" text-anchor="middle" transform="rotate(-90,22,198)">高さ</text>

        <!-- === CYLINDER B (narrow: radius 4cm → draw 60px wide, 200px tall) === -->
        <rect id="cylB" x="320" y="35" width="60" height="200" rx="4"
              fill="none" stroke="#7c3aed" stroke-width="2.5"/>
        <!-- B top ellipse -->
        <ellipse cx="350" cy="35" rx="30" ry="7" fill="none" stroke="#7c3aed" stroke-width="2"/>
        <!-- B bottom ellipse -->
        <ellipse cx="350" cy="235" rx="30" ry="7" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
        <!-- B water fill (starts empty) -->
        <rect id="waterB" x="321" y="235" width="58" height="0"
              fill="#a78bfa" fill-opacity=".7"/>
        <!-- B water surface ellipse -->
        <ellipse id="waterBTop" cx="350" cy="235" rx="29" ry="5"
                 fill="#c4b5fd" fill-opacity=".9"/>
        <!-- B label -->
        <text x="350" y="248" text-anchor="middle" font-size="14" font-weight="700" fill="#7c3aed">B</text>
        <text id="labelB" x="350" y="263" text-anchor="middle" font-size="11" fill="#7c3aed">r = 4 cm</text>
        <!-- B water depth label -->
        <text id="depthLabelB" x="398" y="238" font-size="11" fill="#7c3aed" text-anchor="start">0 cm</text>
        <!-- B height marker -->
        <line x1="390" y1="35" x2="390" y2="235" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
        <text x="400" y="140" font-size="9" fill="#94a3b8" text-anchor="start">30 cm</text>

        <!-- Flow arrow (hidden by default) -->
        <g id="flowArrow" opacity="0">
          <path d="M 245 195 Q 282 175 320 195" stroke="#0891b2" stroke-width="2.5"
                fill="none" stroke-dasharray="6,3" marker-end="url(#arrowHead)"/>
          <text x="282" y="170" text-anchor="middle" font-size="12" fill="#0891b2" id="flowLabel">→ 移し替え</text>
        </g>
        <defs>
          <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#0891b2"/>
          </marker>
        </defs>

        <!-- Phase label -->
        <text id="phaseLabel" x="250" y="20" text-anchor="middle"
              font-size="13" font-weight="600" fill="#334155">
        </text>
      </svg>

      <!-- timeline phase slider -->
      <div class="slider-row" style="margin:10px 0 0;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center;">
        <input type="range" id="phaseSlider" min="0" max="2" step="1" value="0" style="width:100%;accent-color:#0891b2;" />
        <span id="sliderLabel" style="font-size:12px;color:#64748b;white-space:nowrap;">フェーズ 1/3</span>
      </div>
      <!-- Controls -->
      <div class="controls">
        <button id="btnPhase0">① 初期状態</button>
        <button id="btnPhase1">② Aの水をBへ</button>
        <button id="btnPhase2">③ 等しい深さに</button>
        <button id="btnPlay" class="primary">▶ 自動再生</button>
      </div>
      <div class="phase-dots">
        <div class="phase-dot active" id="dot0"></div>
        <div class="phase-dot" id="dot1"></div>
        <div class="phase-dot" id="dot2"></div>
      </div>
      <div class="scene-caption" id="sceneCaption"></div>

      <ul class="keyframes" id="keyframeList" style="margin-top:12px;">
        <li id="kf0"></li>
        <li id="kf1"></li>
        <li id="kf2"></li>
      </ul>
    </div>
  </section>
</main>

// ── State ────────────────────────────────────────────────────────────────────
let lang = 'ja';
let autoLang = false;
let autoTimer = null;
let teacherMode = false;
let stepIdx = 0;
let phase = 0;
let animTimer = null;

// ── DOM helpers ──────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function setText(id, html) {
  const el = $(id);
  if (el) el.innerHTML = html;
}
function setKatex(id, expr) {
  const el = $(id);
  if (!el) return;
  if (window.katex) {
    try {
      el.innerHTML = katex.renderToString(expr, { throwOnError: false, displayMode: true });
    } catch(e) {
      el.textContent = expr;
    }
  } else {
    el.innerHTML = `$$ ${expr} $$`;
    if (window.renderMathInElement) renderMathInElement(el, {
      delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]
    });
  }
}

// ── Render language ──────────────────────────────────────────────────────────
function render() {
  const t = L[lang];
  document.title = t.title;
  document.documentElement.lang = lang;

  setText('titleText', t.title);
  setText('descText', t.desc);

  // Tab buttons
  setText('tabProblemBtn', t.tabProblem);
  setText('tabSolutionBtn', t.tabSolution);
  setText('tabAnimationBtn', t.tabAnim);

  // Lang buttons active state
  ['Ja','Zh','En'].forEach(l => {
    const btn = $('lang'+l+'Btn');
    btn.classList.toggle('active', lang === l.toLowerCase());
  });

  // Problem tab
  setText('problemImageTitle', t.problemImageTitle);
  setText('problemTextTitle', t.problemTextTitle);
  setText('problemText', t.problemText);
  setText('givenTitle', t.givenTitle);
  $('givenList').innerHTML = t.given.map(g => `<li>${g}</li>`).join('');
  setText('targetTitle', t.targetTitle);
  $('targetList').innerHTML = t.target.map(tg => `<li>${tg}</li>`).join('');

  // Solution tab
  setText('solutionMainTitle', t.solutionMainTitle);
  $('teacherModeBtn').textContent = teacherMode ? t.teacherOn : t.teacherOff;
  setText('methodATitle', `<strong>${t.methodATitle}</strong>`);
  setText('step1Text', t.step1Text);
  setKatex('step1Formula', t.step1Formula);
  setText('step2Text', t.step2Text);
  setKatex('step2Formula', t.step2Formula);
  setText('answer1Box', t.answer1);
  setText('methodBTitle', `<strong>${t.methodBTitle}</strong>`);
  setText('step3Text', t.step3Text);
  setKatex('step3Formula', t.step3Formula);
  setText('step4Text', t.step4Text);
  setKatex('step4Formula', t.step4Formula);
  setText('answer2Box', t.answer2);
  setText('mistakeBox', t.mistake);

  // Add Q2 to solution (inject as extra card if not there)
  renderQ2Card(t);

  // Verify table
  setText('verifyTitle', t.verifyTitle);
  setText('colMethod', t.colMethod);
  setText('col1', t.col1);
  setText('col2', t.col2);
  setText('colCheck', t.colCheck);
  $('verifyTableBody').innerHTML = t.verifyRows.map(r =>
    `<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`
  ).join('');

  // Animation
  setText('animTitle', t.animTitle);
  setText('sceneCaption', t.phases[phase]);
  $('keyframeList').innerHTML = t.kf.map((k,i)=>
    `<li id="kf${i}" class="${i===phase?'active':''}">${k}</li>`).join('');

  setText('flowLabel', t.flow);
  setText('labelA', t.labelA);
  setText('labelB', t.labelB);

  applyTeacherMode();
}

function renderQ2Card(t) {
  let card = $('q2Card');
  if (!card) {
    card = document.createElement('div');
    card.id = 'q2Card';
    card.className = 'card';
    card.style.marginTop = '12px';
    $('tabSolution').insertBefore(card, $('tabSolution').children[1]);
  }
  card.innerHTML = `
    <h3>${t.step_q2_title}</h3>
    <p>${t.step_q2_text}</p>
    <div class="formula" id="q2Formula1"></div>
    <div class="formula" id="q2Formula2"></div>
    <div class="answer-box">${t.answer_q2}</div>
  `;
  setKatex('q2Formula1', t.step_q2_formula);
  setKatex('q2Formula2', t.step_q2_calc);
}

// ── Teacher mode ─────────────────────────────────────────────────────────────
function applyTeacherMode() {
  const steps = document.querySelectorAll('.step-answer');
  const t = L[lang];
  if (!teacherMode) {
    steps.forEach(s => s.style.display = 'block');
    $('nextStepBtn').classList.add('hidden');
  } else {
    steps.forEach((s, i) => {
      s.style.display = i < stepIdx ? 'block' : 'none';
    });
    $('nextStepBtn').classList.remove('hidden');
    $('nextStepBtn').textContent = t.nextStep;
  }
}

$('teacherModeBtn').addEventListener('click', () => {
  teacherMode = !teacherMode;
  stepIdx = teacherMode ? 1 : 0;
  render();
});
$('nextStepBtn').addEventListener('click', () => {
  const steps = document.querySelectorAll('.step-answer');
  if (stepIdx < steps.length) stepIdx++;
  applyTeacherMode();
});

// ── Tabs ─────────────────────────────────────────────────────────────────────
function showTab(name) {
  ['Problem','Solution','Animation'].forEach(n => {
    const panel = $('tab'+n);
    const btn = $('tab'+n+'Btn');
    if (n === name) {
      panel.classList.remove('hidden');
      btn.classList.add('active');
    } else {
      panel.classList.add('hidden');
      btn.classList.remove('active');
    }
  });
}
$('tabProblemBtn').addEventListener('click', () => showTab('Problem'));
$('tabSolutionBtn').addEventListener('click', () => showTab('Solution'));
$('tabAnimationBtn').addEventListener('click', () => showTab('Animation'));

// ── Language ─────────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  render();
}
$('langJaBtn').addEventListener('click', () => { stopAuto(); setLang('ja'); });
$('langZhBtn').addEventListener('click', () => { stopAuto(); setLang('zh'); });
$('langEnBtn').addEventListener('click', () => { stopAuto(); setLang('en'); });
$('autoLangBtn').addEventListener('click', () => {
  autoLang = !autoLang;
  const btn = $('autoLangBtn');
  if (autoLang) {
    btn.textContent = '自动轮播 ON'; btn.classList.add('auto-on');
    const langs = ['ja','zh','en'];
    let i = langs.indexOf(lang);
    autoTimer = setInterval(() => {
      i = (i+1) % langs.length;
      lang = langs[i]; render();
    }, 4000);
  } else { stopAuto(); }
});
function stopAuto() {
  autoLang = false;
  clearInterval(autoTimer);
  $('autoLangBtn').textContent = '自动轮播 OFF';
  $('autoLangBtn').classList.remove('auto-on');
}

// ── Animation ────────────────────────────────────────────────────────────────
// SVG coordinates:
// Cylinder A: x=60, y=155 (top), width=180, height=80 → bottom at y=235
//   water rect: x=61, width=178, bottom anchored at y=235
//   3cm water = 3/12 * 80 = 20px high → y = 235-20 = 215
//   0cm = y=235, height=0
// Cylinder B: x=320, y=35 (top), width=60, height=200 → bottom at y=235
//   water rect: x=321, width=58, bottom anchored at y=235
//   27cm water = 27/30 * 200 = 180px → y=235-180=55, height=180
//   2.7cm = 2.7/30*200 = 18px → y=235-18=217, height=18
//   0cm = y=235, height=0

const PHASES = [
  // Phase 0: A at 3cm, B at 0cm
  { depthA: 3, depthB: 0, flow: false,
    pxA: 20, pxB: 0 },
  // Phase 1: A at 0cm, B at 27cm
  { depthA: 0, depthB: 27, flow: true,
    pxA: 0, pxB: 180 },
  // Phase 2: A at 2.7cm, B at 2.7cm
  { depthA: 2.7, depthB: 2.7, flow: false,
    pxA: 18, pxB: 18 }
];

function setPhase(p, animate) {
  phase = p;
  const ph = PHASES[p];

  // Water A
  const wA = $('waterA'), wATop = $('waterATop');
  const yA = 235 - ph.pxA;
  wA.setAttribute('y', yA);
  wA.setAttribute('height', ph.pxA);
  wATop.setAttribute('cy', yA);

  // Water B
  const wB = $('waterB'), wBTop = $('waterBTop');
  const yB = 235 - ph.pxB;
  wB.setAttribute('y', yB);
  wB.setAttribute('height', ph.pxB);
  wBTop.setAttribute('cy', yB);

  // Depth labels
  const dA = ph.depthA > 0 ? ph.depthA + ' cm' : '0 cm';
  const dB = ph.depthB > 0 ? ph.depthB + ' cm' : '0 cm';
  setText('depthLabelA', dA);
  setText('depthLabelB', dB);
  // Reposition depthLabelA
  const labelAEl = $('depthLabelA');
  if (labelAEl) labelAEl.setAttribute('y', Math.max(yA - 4, 162));

  // Flow arrow
  $('flowArrow').setAttribute('opacity', ph.flow ? '1' : '0');

  // Phase dots
  [0,1,2].forEach(i => {
    $('dot'+i).classList.toggle('active', i === p);
  });

  // Sync slider
  const sl = $('phaseSlider');
  if (sl) { sl.value = p; }
  const slLbl = $('sliderLabel');
  if (slLbl) slLbl.textContent = `フェーズ ${p+1}/3`;

  // Caption & keyframes
  const t = L[lang];
  setText('sceneCaption', t.phases[p]);
  [0,1,2].forEach(i => {
    const el = $('kf'+i);
    if (el) {
      el.textContent = t.kf[i];
      el.classList.toggle('active', i === p);
    }
  });
}

// Auto-language rotation / language-rotation via autoTimer (above)
// Phase slider (timeline)
const slider = $('phaseSlider');
if (slider) {
  slider.addEventListener('input', () => {
    stopAnim();
    const p = parseInt(slider.value);
    setPhase(p);
    const lbl = $('sliderLabel');
    if (lbl) lbl.textContent = `フェーズ ${p+1}/3`;
  });
}

$('btnPhase0').addEventListener('click', () => { stopAnim(); setPhase(0); });
$('btnPhase1').addEventListener('click', () => { stopAnim(); setPhase(1); });
$('btnPhase2').addEventListener('click', () => { stopAnim(); setPhase(2); });
$('btnPlay').addEventListener('click', () => {
  const btn = $('btnPlay');
  if (animTimer) { stopAnim(); return; }
  btn.textContent = '⏹ 停止';
  let p = 0;
  setPhase(p);
  animTimer = setInterval(() => {
    p = (p + 1) % 3;
    setPhase(p);
    if (p === 2) { stopAnim(); }
  }, 2000);
});

function stopAnim() {
  clearInterval(animTimer);
  animTimer = null;
  $('btnPlay').textContent = '▶ 自動再生';
}

// ── Init ─────────────────────────────────────────────────────────────────────
render();
setPhase(0);
</script>
